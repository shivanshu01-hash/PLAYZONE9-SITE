<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Cricket Ball Icon -->
  <defs>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#e84040;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#c0392b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b1a1a;stop-opacity:1"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Main ball circle -->
  <circle cx="100" cy="100" r="85" fill="url(#ballGrad)" filter="url(#shadow)"/>
  
  <!-- Seam line - primary -->
  <path d="M 30 100 Q 50 60, 100 55 Q 150 50, 170 100" 
        stroke="#f5e6cc" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 30 100 Q 50 140, 100 145 Q 150 150, 170 100" 
        stroke="#f5e6cc" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Stitching details on seam -->
  <g stroke="#f5e6cc" stroke-width="1.5" fill="none">
    <!-- Top seam stitches -->
    <line x1="45" y1="72" x2="48" y2="68"/>
    <line x1="60" y1="62" x2="63" y2="58"/>
    <line x1="78" y1="56" x2="81" y2="54"/>
    <line x1="95" y1="55" x2="98" y2="54"/>
    <line x1="112" y1="56" x2="115" y2="55"/>
    <line x1="130" y1="60" x2="133" y2="58"/>
    <line x1="148" y1="68" x2="151" y2="66"/>
    <line x1="162" y1="80" x2="165" y2="78"/>
    <!-- Bottom seam stitches -->
    <line x1="45" y1="128" x2="48" y2="132"/>
    <line x1="60" y1="138" x2="63" y2="142"/>
    <line x1="78" y1="144" x2="81" y2="146"/>
    <line x1="95" y1="145" x2="98" y2="146"/>
    <line x1="112" y1="144" x2="115" y2="145"/>
    <line x1="130" y1="140" x2="133" y2="142"/>
    <line x1="148" y1="132" x2="151" y2="134"/>
    <line x1="162" y1="120" x2="165" y2="122"/>
  </g>
  
  <!-- Highlight/shine -->
  <ellipse cx="65" cy="60" rx="25" ry="15" fill="white" opacity="0.15" transform="rotate(-20, 65, 60)"/>
  
  <!-- Subtle texture lines -->
  <g stroke="#a52a2a" stroke-width="0.5" opacity="0.3">
    <line x1="40" y1="50" x2="55" y2="45"/>
    <line x1="35" y1="70" x2="50" y2="65"/>
    <line x1="140" y1="50" x2="155" y2="55"/>
    <line x1="150" y1="70" x2="165" y2="75"/>
    <line x1="40" y1="150" x2="55" y2="155"/>
    <line x1="150" y1="150" x2="165" y2="145"/>
  </g>
</svg>