<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>PLAYZONE9</title>
    <meta name="description" content="Login to PlayZone9 - India's trusted online sports gaming and exchange platform. Access your PlayZone9 account securely. 24x7 support available.">
    <meta name="keywords" content="playzone9 login, playzone9.com login, play zone 9, playzone9 exchange, playzone9 sports">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://playzone9-login.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="PlayZone9 Login - Official Login Page">
    <meta property="og:description" content="Login to PlayZone9 - India trusted online sports gaming platform. Secure login, 24x7 support.">
    <meta property="og:url" content="https://playzone9-login.com/">
    <meta property="og:image" content="https://sitethemedata.com/sitethemes/playzone9.com/front/logo.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PlayZone9 Login - Official Sports Gaming Platform">

    <!-- CSS — same files as reference PLAYZONE9.html -->
    <link href="./PLAYZONE9_files/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./PLAYZONE9_files/all.min.css">
    <link rel="stylesheet" type="text/css" href="./PLAYZONE9_files/style.css">
    <link rel="stylesheet" type="text/css" href="./PLAYZONE9_files/responsive.css">
    <link rel="stylesheet" type="text/css" href="./PLAYZONE9_files/custom.css">
    <link rel="stylesheet" type="text/css" href="./PLAYZONE9_files/theme.css">
</head>
<body>

    <!-- Page wrapper — matches reference login-page structure -->
    <div class="d-flex flex-column align-items-center login-page">

        <!-- Logo -->
        <div class="login-box mt-2 text-center">
            <img src="./PLAYZONE9_files/logo.png"
                 alt="PLAYZONE9 - Official Sports Gaming Login"
                 title="PlayZone9 Login"
                 class="img-fluid">
        </div>

        <!-- Login Card -->
        <div class="card mt-2" style="width:98%;max-width:360px;border-radius:6px;border:2px solid rgba(0,180,255,0.85);box-shadow:0 0 12px rgba(0,180,255,0.65),0 0 25px rgba(0,180,255,0.25),0 0 3px rgba(255,255,255,0.9),0 4px 20px rgba(0,0,0,0.25);">
            <div class="card-body" style="padding:6px 16px 8px;">

                <!-- LOGIN title matching reference (LOGIN + thumbtack icon) -->
                <h1 style="text-align:center;font-family:Oswald,sans-serif;font-size:18px;font-weight:400;color:#1877c4;margin-bottom:14px;letter-spacing:0px;display:flex;justify-content:center;align-items:center;gap:3px;">
                    LOGIN <i class="fas fa-hand-point-down" style="font-size:16px;color:#1877c4;"></i>
                </h1>

                <form id="login-form" autocomplete="on">

                    <!-- Username -->
                    <div class="mb-4 input-group position-relative">
                        <input type="text" id="username" name="username"
                               class="form-control" placeholder="Username"
                               required autocomplete="username">
                        <span class="input-group-text"><i class="fas fa-user" style="color:#000;"></i></span>
                    </div>

                    <!-- Password -->
                    <div class="mb-4 input-group position-relative">
                        <input type="password" id="password" name="password"
                               class="form-control" placeholder="Password"
                               required autocomplete="current-password">
                        <span class="input-group-text"><i class="fas fa-key" style="color:#000;"></i></span>
                    </div>

                    <!-- Login button -->
                    <div class="d-grid">
                        <button type="submit" id="login-btn" class="btn btn-primary btn-block">
                            Login <i class="fas fa-sign-in-alt float-end mt-1"></i>
                        </button>
                    </div>

                    <!-- Forgot Password -->
                    <div class="form-group text-end forgot-font mt-2">
                        <a href="#"><u>Forgot Password?</u></a>
                    </div>

                    <!-- Register -->
                    <div class="mt-2 mb-4" style="text-align:center;">
                        <b>Don't have User?</b>
                        <a href="#" class="ms-1"><b>Register here</b></a>
                    </div>

                    <!-- reCAPTCHA notice -->
                    <small class="recaptchaTerms d-block mt-1" style="text-align:center;">
                        This site is protected by reCAPTCHA and the Google
                        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy Policy</a> and
                        <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms of Service</a> apply.
                    </small>

                    <!-- Footer — fixed at bottom, exactly as reference -->
                    <section class="footer footer-login">
                        <div class="footer-top">
                            <div class="footer-links"></div>
                            <div class="support-detail">
                                <h2>24X7 Support</h2>
                                <p>https://wa.link/playzone9</p>
                            </div>
                            <div class="social-icons-box">
                                <div class="social-icon">
                                    <a href="https://wa.link/playzone9" target="_blank" rel="noopener">
                                        <img src="./PLAYZONE9_files/whatsapp1.png" alt="WhatsApp">
                                    </a>
                                </div>
                            </div>
                        </div>
                    </section>

                </form>
            </div>
        </div>

    </div><!-- /login-page -->

    <!-- Error Modal (shown on invalid login) -->
    <div id="error-modal" class="modal-overlay" role="dialog" aria-modal="true"
         style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:8px;padding:24px;max-width:320px;width:90%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.3);">
            <i class="fas fa-exclamation-circle" style="font-size:48px;color:#e74c3c;margin-bottom:12px;display:block;"></i>
            <h2 style="font-size:18px;margin-bottom:8px;" id="modal-title">Login Failed</h2>
            <p style="color:#666;margin-bottom:16px;">Invalid username or password.<br>Need help? Contact our support team.</p>
            <a class="whatsapp-btn" href="https://wa.link/playzone9" target="_blank" rel="noopener"
               style="display:inline-flex;align-items:center;gap:8px;background:#25D366;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none;font-weight:bold;">
                <i class="fab fa-whatsapp"></i> Contact on WhatsApp
            </a>
        </div>
    </div>

    <script src="./PLAYZONE9_files/jquery-3.5.1.min.js.download"></script>
    <script src="script.js"></script>
</body>
</html>
